services:
  - type: web
    name: declaraciones-tributarias
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    disk:
      name: sqlite-data
      mountPath: /opt/render/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_PATH
        value: /opt/render/data/declaraciones.db
      - key: NEXT_PUBLIC_APP_URL
        value: https://declaraciones-tributarias.onrender.com