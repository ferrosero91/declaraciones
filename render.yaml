services:
  - type: web
    name: declaraciones-tributarias
    env: node
    plan: free
    buildCommand: npm install --legacy-peer-deps && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SSL
        value: "false"
      - key: NEXT_PUBLIC_APP_URL
        value: https://declaraciones-tributarias.onrender.com