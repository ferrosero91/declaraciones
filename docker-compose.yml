services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: declaraciones-app
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - DATABASE_SSL=${DATABASE_SSL:-false}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
    ports:
      - "${PORT:-3000}:3000"
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true